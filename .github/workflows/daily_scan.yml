name: Daily Stock Scanner

on:
  schedule:
    - cron: '30 10 * * *'  # ตั้งเวลา 17:30 น. เวลาประเทศไทย
  workflow_dispatch:        # ให้กดรันเองได้ด้วย

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scan Script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          # ตรงนี้คือการเรียกไฟล์ App.py ของพี่อ้ำให้ทำงานในโหมด Background
          python App.py
